services:
  postgres:
    image: postgres:16-alpine
    container_name: farmacia-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: farmacia_metrics
    ports:
      - "5432:5432"
    volumes:
      - farmacia_pg_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d farmacia_metrics"]
      interval: 5s
      timeout: 5s
      retries: 10

  dashboard:
    image: node:20-bookworm-slim
    container_name: farmacia-dashboard
    working_dir: /app
    volumes:
      - .:/app
      - dashboard_node_modules:/app/node_modules
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/farmacia_metrics
      API_KEY: farmacia-bot-2026-mEtR1c5DaShB0aRdK3y9x7z
      DASHBOARD_USER: admin
      DASHBOARD_PASSWORD: admin
      SESSION_SECRET: farmacia-dashboard-dev-secret
      PORT: "5000"
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm config set strict-ssl false && npm install && npx drizzle-kit push && npx tsx server/index.ts"

volumes:
  farmacia_pg_data:
  dashboard_node_modules:
